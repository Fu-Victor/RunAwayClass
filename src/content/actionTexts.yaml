# 课程行为文案。编写说明见末尾。
attend:
  moodHigh:        "今天的脑子是满血版，老师讲啥秒懂，同桌以为你开了挂"
  moodLow:         "人在教室魂在峡谷，PPT 上的字一个都进不了脑子"
  normal:          "中规中矩的一节课，没睡着也没听进去，主打一个陪伴"
  sleepSuffix:     " 然后没撑住，头一点一点地给老师磕了一整节课的头"
  phoneSuffix:     " 手不受控制地掏出了手机，抖音一刷一节课就没了"
  rollCallSuffix:  " 突然被点到大名，条件反射弹起来：「到！」——坐下发现腿在抖"

skip:
  rollCall:        "翘课被逮！老师点名时你正在宿舍跟泡面深情对视，场面一度尴尬"
  fallback:        "你翘课了，啥也没发生。"
  successPool:
    - "完美翘课！一觉睡到自然醒，群里一看老师没点名，win！"
    - "翘课去图书馆摸鱼，效率居然比上课还高，这波属于是因祸得福"
    - "翘课蹲宿舍打游戏，舍友回来说「没点名」，嘴角比 AK 还难压"
    - "翘课去奶茶店蹲了一下午，发朋友圈配文「在图书馆」，演技封神"

subForOther:
  main:             "替人上课赚外快，人在教室坐钱从群里来——新型数字经济学"
  rollCallSuffix:   " 老师点到那位同学的名字，你愣了一秒才反应过来：「到！」——差点穿帮"

hireSub:
  # {cost} 会被替换为 HIRE_SUB_COST 的值（当前为 25）
  fail:             "花了{cost}块找人代课，结果对方也翘了——属于套娃式被骗，双重暴击"
  rollCall:         "{cost}块换一次安全点名，代课侠帮你扛下所有，这钱花得值"
  safe:             "花{cost}块买个安稳觉，代课侠稳如老狗，老师全程没点名，血赚"

dawn:
  sleepEarly:       "十点就钻进被窝，室友怀疑你被魂穿了——早睡人上人，拒做熬夜狗"
  gaming:           "激战到凌晨三点战绩辉煌，眼睛在流血但快乐是真的，早八？不存在的"
  cram:             "Deadline 是第一生产力！一夜创造一个奇迹，咖啡续到能看见幻觉"
  goOut:            "夜生活刚刚开始！钱包在流泪但朋友圈九宫格已经安排上了"
  normalRest:       "该吃吃该睡睡，平平无奇的夜晚，主打一个养生但没完全养生"

freeSlot:
  self_study:       "没课就来卷一卷，虽然效率不如上课但总比躺着强"
  rest:             "没课当然是补觉！一觉醒来烦恼全消，精神状态直接拉满"
  eat:              "趁没课赶紧去食堂搓一顿，吃饱了才有力气面对接下来的课"
  entertain:        "没课就是用来摸鱼的，掏出手机快乐一下，有人找就说在图书馆"

uiActions:
  # {courseName} 和 {teacher} 会被替换为实际课程名和老师名
  fun:
    rollCall: "{courseName}课上你溜去娱乐，结果{teacher}点名了，快乐瞬间打折。"
    safe:     "{courseName}时段你尽情娱乐，快乐指数飙升！"
  sleep:
    rollCall: "{courseName}课上你在宿舍睡大觉，{teacher}点名了都没听到。"
    safe:     "{courseName}时段你美美补了一觉，精力回满。"
  meal:
    rollCall: "{courseName}课上你在食堂大快朵颐，{teacher}点名时你正嚼着红烧肉。"
    safe:     "{courseName}时段你去食堂搓了一顿，肚子饱了心情好了。"
  work:
    rollCall: "打工回来发现{teacher}点名了，赚的钱还不够补扣的学分。"
    safe:     "{courseName}时段你打工赚了外快，虽然累但钱包鼓了。"
  tutor:
    rollCall: "家教回来发现{teacher}点名了，两头不讨好。"
    safe:     "{courseName}时段你给学弟学妹做家教，赚了钱还巩固了知识。"

# ========================
# 编写说明
# ========================
# 1. 文案风格：搞笑、抽象、轻松，善用网络梗和大学生黑话，绝不严肃
# 2. 含 {cost} 的字段会被引擎替换为实际金钱数值，保留即可
# 3. suffix 类字段会拼接在前一段描述之后，以空格起始即可
# 4. successPool 为随机池，引擎会从中随机选一条展示
# 5. 每条文案控制在 40 字以内，保持节奏紧凑
# 6. uiActions 中的 {courseName} / {teacher} 会被前端替换为实际值
