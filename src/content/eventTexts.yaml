# 事件池：游戏中所有随机触发的事件
# effects 只写非零值即可
# description 和 flavorText 支持按 action 分叉：string | Record<string, string>

- id: "roll_call_crisis_1"
  phase: "course_break"
  condition: "action == 'skip' and trait == 'roll_call_lover'"
  title: "🚨 点名危机！"
  description: "舍友紧急来电：\"兄弟！！下节课老李要查人！！你人在哪？！\""
  options:
    - text: "🏃 飞奔回教室"
      effects:
        energy: -14
      flavorText: "你以百米冲刺速度跑回教室，在老师点到你名字的前一秒推开了门。有惊无险。"
    - text: "🤷 不管了"
      effects:
        credits: -6
        mood: -4
      flavorText: "你选择了摆烂。老师记下了你的名字，发出意味深长的冷笑。"
    - text: "📱 叫舍友喊到"
      effects:
        roommateFavor: -11
      flavorText: "舍友捏着嗓子帮你喊了\"到\"。你欠舍友一个人情。"

- id: "class_quiz_1"
  phase: "course_break"
  condition: "action == 'attend' and special == 'quiz_master'"
  title: "📝 突然提问！"
  description: "老师推了推眼镜，目光锁定你：\"这位同学，你来回答一下。\""
  options:
    - text: "💪 自信作答"
      effects:
        credits: 1
        energy: -4
      flavorText: "你临场发挥居然蒙对了！老师满意地点点头。"
    - text: "🙈 低头装死"
      effects:
        credits: -1
      flavorText: "老师不吃这套。\"下课后到我办公室来一趟。\""

- id: "social_invite_1"
  phase: "course_break"
  condition: "roommateFavor >= 40"
  title: "🍔 食堂邀约"
  description: "舍友发来微信：\"下课去食堂整点？今天有红烧肉！\""
  options:
    - text: "🍖 必须去！"
      effects:
        hunger: 8
        mood: 4
        money: -11
      flavorText: "红烧肉真香！和舍友边吃边吐槽老师，心情大好。"
    - text: "😐 算了下次吧"
      effects:
        roommateFavor: -7
      flavorText: "舍友回了一个\"好吧\"的表情包。"

- id: "random_teacher_dm_1"
  phase: "course_break"
  condition: "default"
  title: "📬 老师私信"
  description: "某老师发来微信：\"同学，上次的作业你好像还没交哦？\""
  options:
    - text: "📝 立马补交"
      effects:
        energy: -14
        credits: 1
      flavorText: "你熬夜肝完了作业。老师回了个\"收到\"。"
    - text: "👻 装没看见"
      effects:
        credits: -3
        mood: -3
      flavorText: "你装作没看到，但每次打开微信都心惊胆战。"

- id: "random_windfall_1"
  phase: "course_break"
  condition: "action != 'skip' and action != 'hire_sub'"
  title: "💸 天降横财"
  description:
    attend: "你在教学楼门口低头一看——地上躺着一张 ¥10！四下无人。"
    sub_for_other: "你替人上完课走出教室，低头一看——地上躺着一张 ¥10！"
    free: "你路过教学楼门口，低头一看——地上躺着一张 ¥10！四下无人。"
  options:
    - text: "🤑 揣兜里"
      effects:
        money: 10
        mood: 3
      flavorText: "横财到手！虽然不多，但蚊子腿也是肉。"
    - text: "😇 交给失物招领"
      effects:
        mood: 2
      flavorText: "没赚到钱，但内心莫名地平静。"

- id: "surprise_quiz_1"
  phase: "course_break"
  condition: "courseType == 'serious' and credits < 20"
  title: "📋 突击测验！！"
  description:
    attend: "据可靠消息，下节课有突击测验！而你几乎没听过课。"
    sub_for_other: "据可靠消息，下节课有突击测验！而你几乎没听过课。"
    skip: "舍友火速微信：\"兄弟快回来！！下节课突击测验！！\"你看了一眼手机，慌了。"
    hire_sub: "代课侠发来微信：\"哥，下节课有测验，你得自己来，我只负责点名。\""
    free: "班级群突然炸了：\"下节有突击测验！！\"你庆幸自己看到了消息。"
  options:
    - text: "📖 狂补笔记"
      effects:
        energy: -17
        credits: 2
      flavorText:
        attend: "你借学霸笔记疯狂抄了一中午。至少没交白卷。"
        skip: "你让舍友拍照发来笔记，在宿舍狂补。至少没交白卷。"
        default: "你到处借笔记疯狂补课。至少没交白卷。"
    - text: "🎲 相信自己"
      effects:
        credits: -4
      flavorText:
        attend: "你自信满满走进考场……发现自己连题目都看不懂。"
        skip: "你从宿舍狂奔到考场……发现自己连题目都看不懂。"
        default: "你硬着头皮进了考场……发现自己连题目都看不懂。"

- id: "roommate_rage_1"
  phase: "dawn"
  condition: "action == 'gaming' and roommateFavor <= 40"
  title: "😡 舍友暴怒"
  description: "凌晨两点，舍友猛地坐起来：\"你再敲那个键盘我就把你机箱扔下楼！！\""
  options:
    - text: "🎧 戴耳机继续"
      effects:
        entertainment: 5
        roommateFavor: -21
        mood: 1
      flavorText: "你戴上耳机继续战斗。舍友的怨气已实体化。"
    - text: "😴 乖乖关机"
      effects:
        roommateFavor: 3
        energy: 4
      flavorText: "你识相地关了电脑。明天再战也不迟。"

- id: "late_emo_1"
  phase: "dawn"
  condition: "mood <= 35 and action != 'sleep_early'"
  title: "🌙 深夜 emo"
  description: "深夜两点，你突然开始思考人生意义——我为什么要上大学？我是谁？"
  options:
    - text: "🎵 打开网抑云"
      effects:
        entertainment: -7
        mood: -11
      flavorText: "越听越难受。今晚注定是个不眠之夜。"
    - text: "🍜 点夜宵"
      effects:
        money: -21
        hunger: 5
        mood: 3
      flavorText: "热气腾腾的夜宵下肚，人生还是有意义的。"

- id: "random_midnight_takeout_1"
  phase: "dawn"
  condition: "action != 'sleep_early'"
  title: "📱 深夜外卖诱惑"
  description: "满 30 减 15，满 50 减 25——这个力度不点还是人？！"
  options:
    - text: "🍕 果断下单"
      effects:
        money: -28
        hunger: 8
        mood: 4
      flavorText: "深夜碳水，治愈一切。"
    - text: "😤 忍住省钱"
      effects: {}
      flavorText: "你咬了咬牙关掉 App。省下的钱在心里说了声谢谢。"

- id: "early_bird_1"
  phase: "dawn"
  condition: "action == 'sleep_early'"
  title: "🌅 早起的感觉"
  description: "清晨六点自然醒，窗外有鸟叫，空气清新，人生充满希望。"
  options:
    - text: "🏃 去跑步"
      effects:
        energy: 5
        mood: 3
      flavorText: "跑了三圈，感受到了久违的内啡肽。"
    - text: "🛏️ 再睡会"
      effects:
        energy: 8
      flavorText: "翻了个身又睡了两小时。确实很爽。"
